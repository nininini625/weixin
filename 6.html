<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加微信 LXJx9994364</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f7f8fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            max-width: 360px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .title {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #666666;
            margin-bottom: 24px;
        }
        .qrcode {
            width: 280px;
            height: auto;
            border-radius: 12px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            /* 强制图片加载，防止空白 */
            min-height: 350px;
            object-fit: contain;
        }
        .wxid-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .wxid {
            font-size: 18px;
            font-weight: 700;
            color: #07c160;
            background: #f0f9f4;
            padding: 8px 16px;
            border-radius: 8px;
        }
        .copy-btn {
            background: #07c160;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .copy-btn:hover {
            background: #06ae56;
        }
        .tip {
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">长按添加微信</h1>
        <p class="subtitle">扫码或复制微信号添加</p>

        <!-- 修复：永久稳定可访问的二维码图片链接 -->
        <img 
            class="qrcode" 
            src="https://s2.loli.net/2025/04/01/9XZ7kYqgRfL3s8a.png" 
            alt="微信二维码"
            loading="lazy"
            onerror="this.src='https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/backup-qrcode.png'"
        >

        <!-- 微信号 + 一键复制 -->
        <div class="wxid-wrap">
            <span class="wxid" id="wxid">LXJx9994364</span>
            <button class="copy-btn" onclick="copyWxid()">复制微信号</button>
        </div>

        <p class="tip">复制后打开微信 → 右上角「+」→ 添加朋友 → 粘贴搜索</p>
    </div>

    <script>
        function copyWxid() {
            const wxid = document.getElementById('wxid').innerText;
            navigator.clipboard.writeText(wxid).then(() => {
                alert('✅ 微信号已复制，打开微信粘贴即可添加');
            }).catch(() => {
                alert('复制失败，请手动复制：LXJx9994364');
            });
        }
    </script>
</body>
</html>
