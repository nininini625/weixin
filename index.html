<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加微信 LXJx9994364</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#f5f5f5;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:20px}
        .card{max-width:320px;margin:60px auto;background:white;padding:30px 25px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);text-align:center}
        .title{font-size:20px;font-weight:600;margin-bottom:8px;color:#07c160}
        .tip{color:#666;font-size:14px;margin-bottom:24px}
        .qrcode{width:220px;height:220px;margin:0 auto;border-radius:12px;overflow:hidden}
        .qrcode img{width:100%;height:100%;object-fit:cover}
        .wechat-id{margin-top:20px;font-size:16px;color:#333}
        .wechat-id span{font-weight:700;color:#07c160}
        .copy-btn{margin-top:20px;padding:10px 20px;background:#07c160;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px}
    </style>
</head>
<body>
    <div class="card">
        <div class="title">长按添加微信</div>
        <div class="tip">扫码或手动搜索微信号</div>
        <div class="qrcode">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=LXJx9994364" alt="微信二维码">
        </div>
        <div class="wechat-id">微信号：<span id="wxid">LXJx9994364</span></div>
        <button class="copy-btn" onclick="copyWxid()">复制微信号</button>
    </div>
    <script>
        function copyWxid() {
            navigator.clipboard.writeText('LXJx9994364').then(() => {
                alert('微信号已复制，打开微信粘贴搜索即可');
            });
        }
    </script>
</body>
</html>
